name: CI

on:
  push:
    branches: [ main, Assignment_6 ]
  pull_request:
    branches: [ main, Assignment_6 ]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── BUILD (install all dependencies) ───────────────────
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install AI component dependencies
        working-directory: AI_component
        run: npm ci

      # ── TESTS ──────────────────────────────────────────────
      - name: Run frontend tests
        working-directory: frontend
        run: npm test

      - name: Run backend tests
        working-directory: backend
        run: npm test

      - name: Run AI component tests
        working-directory: AI_component
        run: npm test
